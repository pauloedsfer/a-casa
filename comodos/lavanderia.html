<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lava& — lavanderia inteligente</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../css/casa.css?v=12">
<style>
  body.lavanderia{ --bg:#eef1f4; --fg:#2b3138; --fg-dim:#7c8896; --accent:#2f9e78;
    background:#eef1f4; color:#2b3138;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    cursor:default; animation:none; }
  body.lavanderia::before{ opacity:0; }
  body.lavanderia::after{ background:none; }
  .lavanderia .tela{ max-width:560px; }

  .lav-topo{ text-align:center; padding:10px 0 4px; }
  .marca{ font-size:34px; font-weight:700; letter-spacing:-1px; color:#1f6f54; }
  .marca span{ color:#2f9e78; }
  .tagline{ font-size:13px; color:#7c8896; margin-top:2px; letter-spacing:.5px; }

  .lav-intro{ text-align:center; font-size:15px; margin:22px 0; color:#4a545e; }

  .aparelhos{ display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
  .aparelho{ width:170px; background:#fff; border:1px solid #dbe1e8; border-radius:16px; padding:20px 16px; cursor:pointer; text-transform:none; letter-spacing:0; color:#2b3138; font-family:inherit; transition:box-shadow .2s, transform .2s; box-shadow:0 2px 10px rgba(40,60,90,.06); }
  .aparelho:hover{ box-shadow:0 6px 20px rgba(40,60,90,.14); transform:translateY(-2px); background:#fff; }
  .aparelho .visor{ width:74px; height:74px; border-radius:50%; margin:0 auto 12px; background:radial-gradient(circle at 50% 45%, #dfe8f0 0 42%, #c6d3de 44%, #aebbc8 46% 100%); border:6px solid #eef2f6; box-shadow:inset 0 0 12px rgba(0,0,0,.12); transition:background .4s; }
  .aparelho .nome{ display:block; font-size:15px; font-weight:600; }
  .aparelho .estado{ display:block; font-size:12px; color:#8a95a1; margin-top:3px; }
  .aparelho.aberto .visor{ background:radial-gradient(circle at 50% 45%, #6b1414 0 44%, #3a0a0a 46% 100%); }

  .achado[hidden]{ display:none; }
  .achado{ margin:24px auto 0; max-width:460px; background:#fff; border:1px solid #e6c9c9; border-left:4px solid #a11; border-radius:0 12px 12px 0; padding:16px 18px; font-size:14px; line-height:1.6; color:#3a2020; }
  .achado .item{ padding:8px 0; border-bottom:1px dotted #e3c6c6; }
  .achado .item:last-child{ border-bottom:none; }
  .achado b{ color:#8a1414; }

  /* a presença intrusa (CRT) sobre o site limpo */
  .presenca{ display:none; border:1px solid #2b8; background:#04120b; color:#33ff66; font-family:"Courier New",monospace; margin:16px 0; }
  body.lavanderia.corrompida .presenca{ display:block; }

  /* corrupção: manchas de sangue + escurecimento */
  #manchas{ position:fixed; inset:0; pointer-events:none; z-index:1; }
  .mancha{ position:absolute; border-radius:50%; background:radial-gradient(circle, rgba(120,8,8,.85) 0%, rgba(90,4,4,.5) 40%, rgba(60,0,0,0) 72%); transform:scale(0); transition:transform 1.1s cubic-bezier(.2,.7,.3,1); }
  .mancha.aberta{ transform:scale(1); }
  body.lavanderia.corrompida{ background:#1a0e0e; color:#e7cccc; transition:background 1.2s, color 1.2s; }
  body.lavanderia.corrompida .marca{ color:#7a1010; }
  body.lavanderia.corrompida .marca span{ color:#c0392b; }
  body.lavanderia.corrompida .tagline,
  body.lavanderia.corrompida .lav-intro{ color:#a56b6b; }
  body.lavanderia.corrompida .aparelho{ background:#241414; border-color:#4a2020; color:#e7cccc; box-shadow:none; }
  body.lavanderia.corrompida::before{ opacity:.4; transition:opacity 1.2s; }
</style>
</head>
<body class="lavanderia">
  <div class="tela">
    <div class="lav-topo">
      <div class="marca">Lava<span>&</span></div>
      <div class="tagline">lavanderia inteligente · sua roupa impecável</div>
    </div>

    <div class="presenca"><span id="voz-texto"></span><span class="cursor">▊</span></div>

    <p class="lav-intro" id="lav-intro">bem-vindo de volta! faz tempo que nenhum ciclo roda por aqui. escolha um aparelho pra começar.</p>

    <div class="aparelhos">
      <button class="aparelho" id="lavar">
        <div class="visor"></div>
        <span class="nome">máquina de lavar</span>
        <span class="estado" id="estado-lavar">ciclo concluído</span>
      </button>
      <button class="aparelho" id="secar">
        <div class="visor"></div>
        <span class="nome">secadora</span>
        <span class="estado" id="estado-secar">pronta</span>
      </button>
    </div>

    <div class="achado" id="achado" hidden></div>

    <p class="nav" style="margin-top:26px"><a class="porta voltar aceso" href="../index.html">saguão</a></p>
    <p class="assinado" style="text-align:center;font-size:12px;color:#9aa6b2;margin-top:8px">recknocking · the house</p>
  </div>

  <div id="manchas"></div>

  <script src="../js/estado.js?v=12"></script>
  <script src="../js/casa.js?v=12"></script>
  <script src="../js/comodo.js?v=12"></script>
  <script src="../js/lavanderia.js?v=12"></script>
</body>
</html>
