<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>corredor escuro</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../css/casa.css?v=12">
<style>
  #trilho{ font-size:14px; line-height:1.65; margin-bottom:14px; }
  #trilho .passo{ padding:10px 0; border-bottom:1px dotted rgba(77,255,122,.15); }
  #trilho .passo:last-child{ color:var(--accent); }
  #seguir[hidden]{ display:none; }

  .selo-achado[hidden]{ display:none; }
  .selo-achado{ text-align:center; margin:10px 0 2px; }
  .selo-achado .glifo{ font-size:46px; color:var(--accent); text-shadow:0 0 16px var(--accent); }
  .selo-achado .nota{ display:block; font-size:12px; color:var(--fg-dim); margin-top:4px; letter-spacing:1px; }
</style>
</head>
<body class="corredor">
  <div class="tela">
    <button id="som" class="som" aria-label="ligar ou desligar som" title="som">&#9834;</button>
    <h1>corredor escuro</h1>
    <p class="sub">nenhuma lâmpada funciona. só a luz por baixo das portas.</p>
    <div class="presenca"><span id="voz-texto"></span><span class="cursor">▊</span></div>

    <div class="caixa">
      <div id="trilho"></div>
      <div style="text-align:center">
        <button id="seguir">seguir em frente</button>
      </div>
      <div class="selo-achado" id="selo" hidden>
        <div class="glifo">◈</div>
        <span class="nota">quarto selo · a chave do porão</span>
      </div>
    </div>

    <div class="caixa">
      <div class="selos" id="selos"></div>
    </div>

    <p class="nav"><a class="porta voltar aceso" href="../index.html">saguão</a></p>
    <p class="assinado" style="text-align:center;font-size:12px;color:var(--fg-dim)">recknocking · the house</p>
  </div>

  <script src="../js/estado.js?v=12"></script>
  <script src="../js/casa.js?v=12"></script>
  <script src="../js/corredor.js?v=12"></script>
</body>
</html>
