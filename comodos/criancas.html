<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>quarto das crianças</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../css/casa.css?v=12">
</head>
<body class="criancas">
  <div class="tela">
    <button id="som" class="som" aria-label="ligar ou desligar som" title="som">&#9834;</button>
    <h1>quarto das crianças</h1>
    <p class="sub">três caminhas, sempre feitas. alguém ri baixinho quando você não olha.</p>
    <div class="presenca"><span id="voz-texto"></span><span class="cursor">▊</span></div>

    <div class="caixa">
      <p>o papel de parede tem estrelinhas. no chão, três brinquedos esperam há muito tempo. cada um tem um nome arranhado embaixo, com letra de quem ainda aprendia a escrever.</p>
    </div>

    <div class="caixa">
      <div class="brinquedos">
        <button class="brinquedo" id="cavalo">
          <svg viewBox="0 0 60 60"><g class="toy balanca">
            <path d="M18 20 L18 34 M18 22 Q30 14 40 24 L40 34"/>
            <circle cx="18" cy="18" r="3"/>
            <path d="M12 44 Q30 56 48 44"/>
            <path d="M22 34 L22 44 M36 34 L36 44"/>
          </g></svg>
          <span class="etiqueta" id="et-cavalo">clique</span>
        </button>
        <button class="brinquedo" id="urso">
          <svg viewBox="0 0 60 60"><g class="toy">
            <circle cx="30" cy="24" r="12"/>
            <circle cx="20" cy="14" r="4"/><circle cx="40" cy="14" r="4"/>
            <circle cx="26" cy="22" r="1.5"/><circle cx="34" cy="22" r="1.5"/>
            <path d="M30 26 Q27 30 30 31 Q33 30 30 26"/>
            <path d="M22 36 Q30 46 38 36"/>
          </g></svg>
          <span class="etiqueta" id="et-urso">clique</span>
        </button>
        <button class="brinquedo" id="blocos">
          <svg viewBox="0 0 60 60"><g class="toy">
            <rect x="16" y="34" width="14" height="14" rx="2"/>
            <rect x="30" y="34" width="14" height="14" rx="2"/>
            <rect x="23" y="20" width="14" height="14" rx="2"/>
            <path d="M21 41 h4 M35 41 h4 M28 27 h4"/>
          </g></svg>
          <span class="etiqueta" id="et-blocos">clique</span>
        </button>
      </div>
    </div>

    <div class="caixa" id="caixa-sussurros" hidden>
      <div class="sussurros" id="sussurros"></div>
    </div>

    <p class="nav"><a class="porta voltar aceso" href="../index.html">saguão</a></p>
    <p class="assinado" style="text-align:center;font-size:12px;color:var(--fg-dim)">recknocking · the house</p>
  </div>

  <script src="../js/estado.js?v=12"></script>
  <script src="../js/casa.js?v=12"></script>
  <script src="../js/comodo.js?v=12"></script>
  <script src="../js/criancas.js?v=12"></script>
</body>
</html>
